#######################################################################################################
# Описание:
# Веб-интерфейс доступен по адресу http://192.168.1.1:9090/ui (192.168.1.1 = IP роутера).
# После добавления сервера и запуска mihomo необходимо зайти в веб-интерфейс и выбрать нужное подключение для селекторов.
# Группа "Заблок. сервисы" содержит список доменов большинства заблокированных ресурсов.
# Остальные группы YouTube/Discord и тд имеют приоритет над группой "Заблок. сервисы".
#######################################################################################################
# Если UnifiedUI работает не на всех портах (unified -cp), то для корректной работы следующих сервисов выполните:
# Для Discord:
# unified -ap 80,443,2053:2096,8443,19200:19400,50000:50100
# Для Whatsapp/Telegram:
# unified -ap 80,443,596:599,1400,3478,5222
#######################################################################################################

log-level: silent
allow-lan: true
geodata-mode: true
geox-url:
  geosite: "https://github.com/jameszeroX/zkeen-domains/releases/latest/download/zkeen.dat"
  geoip: "https://github.com/jameszeroX/zkeen-ip/releases/latest/download/zkeenip.dat"
redir-port: 5000
tproxy-port: 5001
routing-mark: 255
find-process-mode: off
unified-delay: true
external-controller: 0.0.0.0:9090
external-ui: zashboard
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
profile: { store-selected: true }
sniffer: { enable: true, sniff: { HTTP: { ports: [80, 8080] }, TLS: { ports: [443, 8443] } }, skip-dst-address: [rule-set:telegram@ipcidr] }

anchors:
  a1: &domain { type: http, format: mrs, behavior: domain, interval: 86400 }
  a2: &ipcidr { type: http, format: mrs, behavior: ipcidr, interval: 86400 }
  a3: &classical { type: http, format: text, behavior: classical, interval: 86400 }
  a4: &inline { type: inline, behavior: classical }

proxy-providers:
  proxy-sub:
    type: http
    url: ""
    path: ./proxy_providers/proxy-sub.yaml
    interval: 3600
    health-check:
      enable: true
      url: "http://www.gstatic.com/generate_204"
      interval: 300
      timeout: 8000
      lazy: true
      expected-status: 204
    override:
      tfo: true
      mptcp: true
      udp: true

proxy-groups:
  - name: Заблок. сервисы
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Reject.png
    include-all: true

  - name: YouTube
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    include-all: true
    proxies: [Заблок. сервисы, DIRECT]

  - name: Discord
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Discord.png
    include-all: true
    proxies: [Заблок. сервисы, DIRECT]

  - name: Twitch
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Twitch.png
    include-all: true
    proxies: [DIRECT, Заблок. сервисы]

  - name: Reddit
    type: select
    icon: https://www.redditstatic.com/shreddit/assets/favicon/192x192.png
    include-all: true
    proxies: [DIRECT, Заблок. сервисы]

  - name: Meta
    type: select
    icon: https://github.com/zxc-rv/assets/raw/main/group-icons/meta.png
    include-all: true
    proxies: [Заблок. сервисы, DIRECT]

  - name: Spotify
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Spotify.png
    include-all: true
    exclude-filter: 🇷🇺
    proxies: [Заблок. сервисы, DIRECT]

  - name: Speedtest
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Speedtest.png
    include-all: true
    proxies: [Заблок. сервисы, DIRECT]

  - name: Telegram
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
    include-all: true
    proxies: [Заблок. сервисы, DIRECT]

  - name: Steam
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Steam.png
    include-all: true
    proxies: [DIRECT, Заблок. сервисы]

  - name: CDN
    type: select
    icon: https://www.svgrepo.com/show/396567/globe-with-meridians.svg
    include-all: true
    proxies: [Заблок. сервисы, PASS]

  - name: Google
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png
    include-all: true
    proxies: [PASS, Заблок. сервисы]

  - name: GitHub
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png
    include-all: true
    proxies: [PASS, Заблок. сервисы]

  - name: AI
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bot.png
    include-all: true
    exclude-filter: 🇷🇺
    proxies: [Заблок. сервисы]

  - name: Twitter
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Twitter.png
    include-all: true
    proxies: [Заблок. сервисы, DIRECT]

  - name: QUIC
    type: select
    icon: https://github.com/zxc-rv/assets/raw/main/group-icons/quic.png
    proxies: [REJECT, PASS]

rule-providers:
  adlist@domain: { <<: *domain, url: https://github.com/zxc-rv/ad-filter/releases/latest/download/adlist.mrs }
  category-ai@domain: { <<: *domain, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geo/geosite/category-ai.mrs }
  steam@domain: { <<: *domain, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geo/geosite/steam.mrs }
  spotify@domain: { <<: *domain, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geo/geosite/spotify.mrs }
  speedtest@domain: { <<: *domain, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geo/geosite/speedtest.mrs }
  reddit@domain: { <<: *domain, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geo/geosite/reddit.mrs }
  twitch@domain: { <<: *domain, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geo/geosite/twitch.mrs }
  twitter@domain: { <<: *domain, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geo/geosite/twitter.mrs }
  meta@domain: { <<: *domain, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geo/geosite/meta.mrs }
  discord@classical: { <<: *classical, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geo/classical/discord.txt }
  refilter@domain: { <<: *domain, url: https://raw.githubusercontent.com/1andrevich/Re-filter-lists/release/refilter_domains.mrs }
  telegram@ipcidr: { <<: *ipcidr, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geo/geoip/telegram.mrs }
  github@domain: { <<: *domain, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geo/geosite/github.mrs }
  private@ip: { <<: *ipcidr, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geo/geoip/private.mrs }
  quic@inline: { <<: *inline, payload: ['AND,((DST-PORT,443),(NETWORK,UDP))'] }
  user@classical: # СВОИ ПРАВИЛА
    type: inline
    behavior: classical
    payload: # Типы правил и примеры: https://wiki.metacubex.one/ru/config/rules/
      - DOMAIN-SUFFIX,2ip.io
rules:
  - RULE-SET,adlist@domain,REJECT # Блокировка рекламы
  - RULE-SET,quic@inline,REJECT # Блокировка QUIC

  # Разблокировка высокого качества на Twitch.tv
  # @pkg Twitch begin
  - OR,((DOMAIN-SUFFIX,gql.twitch.tv),(DOMAIN-SUFFIX,usher.ttvnw.net)),Заблок. сервисы
  # @pkg Twitch end

  # Категория AI
  - RULE-SET,category-ai@domain,AI

  # Steam / Spotify / Reddit / Twitch / Twitter / Discord
  - RULE-SET,steam@domain,Steam
  - RULE-SET,spotify@domain,Spotify
  - RULE-SET,reddit@domain,Reddit
  - RULE-SET,twitch@domain,Twitch
  - RULE-SET,twitter@domain,Twitter
  - RULE-SET,discord@classical,Discord
  - RULE-SET,speedtest@domain,Speedtest # Для корректного замера нужно добавить порт 8080 через unified -ap или в /opt/etc/unified/port_proxying.lst

  # YouTube: домены + IP через ZKeen
  - GEOSITE,YOUTUBE,YouTube
  - GEOIP,YOUTUBE,YouTube

  # Meta: домены (meta@domain) + IP (GEOIP,META) в одну группу Meta
  - RULE-SET,meta@domain,Meta
  - GEOIP,META,Meta

  # --- Хостинги и CDN по GEOIP из ZKeen ---
  - GEOIP,AKAMAI,CDN
  - GEOIP,AMAZON,CDN
  - GEOIP,CDN77,CDN
  - GEOIP,CLOUDFLARE,CDN
  - GEOIP,COLOCROSSING,CDN
  - GEOIP,CONTABO,CDN
  - GEOIP,DIGITALOCEAN,CDN
  - GEOIP,FASTLY,CDN
  - GEOIP,GCORE,CDN
  - GEOIP,GOOGLE,Google
  - GEOIP,HETZNER,CDN
  - GEOIP,LINODE,CDN
  - GEOIP,MEGA,CDN
  - GEOIP,ORACLE,CDN
  - GEOIP,OVH,CDN
  - GEOIP,SCALEWAY,CDN
  - GEOIP,TELEGRAM,Telegram
  - GEOIP,VODAFONE,CDN
  - GEOIP,VULTR,CDN
  # --- ZKeen GEOSITE для заблокированных доменов ---
  - RULE-SET,refilter@domain,Заблок. сервисы
  - GEOSITE,DOMAINS,Заблок. сервисы
  - GEOSITE,OTHER,Заблок. сервисы
  - GEOSITE,POLITIC,Заблок. сервисы

  # GitHub
  - RULE-SET,github@domain,GitHub

  # Локальные сети
  - RULE-SET,private@ip,DIRECT

  # По умолчанию
  - MATCH,DIRECT
