rules:
  - RULE-SET,geosite-private,DIRECT
  - RULE-SET,geoip-private,DIRECT,no-resolve
  - DOMAIN-SUFFIX,local,DIRECT

  # Блокировка QUIC / HTTP/3. Может затронуть любые приложения, использующие UDP 443/8443.
  # Ставим выше сервисных правил, чтобы UDP 443 не уходил в YouTube/Google/Discord/etc.
  - AND,((NETWORK,udp),(DST-PORT,443)),REJECT
  - AND,((NETWORK,udp),(DST-PORT,8443)),REJECT

  - RULE-SET,ads_domains,REJECT
  - RULE-SET,apple,DIRECT

  - DOMAIN-SUFFIX,github.com,GitHub
  - DOMAIN-SUFFIX,githubusercontent.com,GitHub
  - DOMAIN-SUFFIX,raw.githubusercontent.com,GitHub
  - DOMAIN-SUFFIX,githubassets.com,GitHub
  - DOMAIN-SUFFIX,github.io,GitHub
  - DOMAIN-SUFFIX,githubapp.com,GitHub
  - DOMAIN-SUFFIX,github.dev,GitHub
  - DOMAIN-SUFFIX,githubstatus.com,GitHub

  - RULE-SET,ai_openai,AI
  - RULE-SET,ai_category,AI

  - RULE-SET,playstation,PlayStation
  - RULE-SET,xbox,Xbox
  - RULE-SET,spotify,Spotify
  - RULE-SET,steam,Steam

  - RULE-SET,youtube,YouTube
  - RULE-SET,youtubeip,YouTube,no-resolve

  - RULE-SET,meta,Meta
  - RULE-SET,metaip,Meta,no-resolve

  - RULE-SET,telegram,Telegram
  - RULE-SET,telegramip,Telegram,no-resolve

  - RULE-SET,discord,Discord
  - RULE-SET,discord_vc,Discord

  - RULE-SET,ru_blocked,Заблокировано в РФ
  - RULE-SET,politic,Заблокировано в РФ
  - DOMAIN-SUFFIX,cdn-service.space,Заблокировано в РФ
