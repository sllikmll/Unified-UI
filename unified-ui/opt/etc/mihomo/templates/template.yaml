#######################################################################################################
# Описание:
# Веб-интерфейс доступен по адресу http://192.168.1.1:9090/ui (192.168.1.1 = IP роутера).
# После добавления сервера и запуска mihomo необходимо зайти в веб-интерфейс и выбрать нужное подключение для селекторов.
#######################################################################################################
# Если UnifiedUI работает не на всех портах (unified -cp), то для корректной работы следующих сервисов выполните:
# Для Discord:
# unified -ap 80,443,2053:2096,8443,19200:19400,50000:50100
# Для Whatsapp/Telegram:
# unified -ap 80,443,596:599,1400,3478,5222
#######################################################################################################

log-level: silent
mode: rule
ipv6: false
allow-lan: true
redir-port: 5000
tproxy-port: 5001
routing-mark: 255
find-process-mode: off
unified-delay: true
external-controller: 0.0.0.0:9090
external-ui: zashboard
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
profile: { store-selected: true }

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080]
      override-destination: true
    TLS:
      ports: [443, 8443]

proxy-providers:
  proxy-sub:
    type: http
    # Замените пример ниже на URL вашей Mihomo/Clash-подписки.
    url: "https://example.com/subscription"
    path: ./proxy_providers/proxy-sub.yaml
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
      expected-status: 204
    override:
      udp: true
      tfo: true

proxy-groups:
- name: VPN
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hijacking.png
  include-all: true
  proxies: ["⚡️ Fastest", DIRECT]

- name: ⚡️ Fastest
  type: url-test
  hidden: true
  # exclude-filter: "Без VPN|🇷🇺|test|old" # Исключает ноды только из авто-выбора ⚡️ Fastest. В остальных группах они останутся доступны. Добавляй слова/флаги через |. Это regex-фильтр.
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
  use:
  - proxy-sub
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 150
  lazy: true

