  - DOMAIN-SUFFIX,smarttvcdn.online,Заблокировано в РФ
  - DST-PORT,30000-31000,Заблокировано в РФ
  - DOMAIN-SUFFIX,wwsga.me,Заблокировано в РФ
  - DOMAIN-SUFFIX,gran-turismo.com,Заблокировано в РФ

  - RULE-SET,no_russia_hosts,Недоступно из РФ
  - RULE-SET,roblox,Недоступно из РФ
  - DOMAIN-SUFFIX,4pda.to,Недоступно из РФ
  - DOMAIN-SUFFIX,happ-proxy.com,Недоступно из РФ
  - RULE-SET,oracle,Недоступно из РФ,no-resolve

